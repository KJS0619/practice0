<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; font-family: "Malgun Gothic", "맑은 고딕", sans-serif; overflow: hidden; }
  .card {
    width: 1200px; height: 630px;
    position: relative;
    background: linear-gradient(160deg, #274a5d 0%, #1a3344 45%, #0d1b26 100%);
    overflow: hidden;
  }
  .glow1 { position: absolute; top: -100px; left: 60px; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,206,120,0.35), rgba(255,206,120,0) 70%); }
  .glow2 { position: absolute; bottom: -160px; right: -80px; width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(circle, rgba(93,224,230,0.25), rgba(93,224,230,0) 70%); }
  .horizon { position: absolute; left: 0; right: 0; bottom: 190px; height: 1px; background: rgba(255,255,255,0.12); }
  .caption-bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 40px 90px 46px 90px;
    background: linear-gradient(to top, rgba(10,15,20,0.88), rgba(10,15,20,0));
    color: #f4f2ff;
  }
  .kicker { font-size: 20px; letter-spacing: 3px; color: #ffce78; font-weight: 700; margin-bottom: 12px; }
  .caption { font-size: 32px; font-weight: 700; line-height: 1.5; max-width: 980px; word-break: keep-all; }
</style>
</head>
<body>
  <div class="card">
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="horizon"></div>
    <div class="caption-bar">
      <div class="kicker">{{KICKER}}</div>
      <div class="caption">{{CAPTION}}</div>
    </div>
  </div>
</body>
</html>
